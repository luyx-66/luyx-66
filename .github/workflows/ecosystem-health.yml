name: Ecosystem health

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "ecosystem.json"
      - "scripts/check-ecosystem.mjs"
      - ".github/workflows/ecosystem-health.yml"
  schedule:
    - cron: "23 7 * * 3"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Validate catalog
        run: node scripts/check-ecosystem.mjs --schema-only
      - name: Check public destinations
        run: node scripts/check-ecosystem.mjs
      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ecosystem-health
          path: artifacts/ecosystem-health.json
          if-no-files-found: warn
          retention-days: 30
